<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<label for="name">Name: </label>
		<input name="name" type="text" id="name" required>
		<br><br>
		<label for="email">Email: </label>
		<input name="email" type="email" id="email" required>
		<br><br>
		<label for="male">Male</label>
		<input name="gender" value="male" type="radio" id="male" required>
		<br><br>
		<label for="female">Female</label>
		<input name="Gender" value="female" type="radio" id="female" required>
		<br><br>
		<label for="cars">Car Brands:</label>
		<select id="cars" name="carBrands">
			<option>BMW</option>
			<option>Audi</option>
			<option>Mercedez</option>
		</select>
		<br><br>
		<label for="carage">Car Age:</label>
		<input name="carAge" type="number" id="carage" required>
		<br><br>
		<label for="dop"></label>
		<input name="DOP" type="date" id="dop" required>
		<br><br>
		<label for="password">Password: </label>
		<input name="Password" type="password" id="password" required>
		<br><br>
		<button name="Submit" type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
